name: Benchmarks

on:
  # main 머지 후 자동 실행 — 추세 차트를 자동으로 누적한다.
  # fail-on-alert: false 이므로 노이즈 오탐이 CI를 막지 않는다.
  push:
    branches: [main]
  # 수동 트리거도 유지 (로컬 재현 확인용)
  workflow_dispatch:

permissions:
  contents: write  # gh-pages 브랜치에 벤치마크 결과를 push하기 위해 필요

# Node.js 24 opt-in (enforcement: 2026-06-02)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: bench-pages
  cancel-in-progress: false  # 벤치마크는 직렬 실행: 데이터 손실 방지

jobs:
  bench:
    name: Run and publish benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=3s -run=^$ ./... | tee bench-output.txt

      - name: Publish benchmark results to GitHub Pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: dag-go benchmarks
          tool: go
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          # 110%: 직전 대비 10% 이상 성능 저하 시 PR 코멘트 알림
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@HeaInSeo"
